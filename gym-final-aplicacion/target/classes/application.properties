# =============================================
# CONFIGURACION BASE DE DATOS - ORACLE 21c
# =============================================
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=system
spring.datasource.password=isabela
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# SERVIDOR
# =============================================
server.port=8080
spring.application.name=gym-system

# =============================================
# LOGS - SQL completo para diagnostico
# =============================================
logging.level.com.gym=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# =============================================
# ORACLE - fixes clave
# =============================================
spring.jpa.properties.hibernate.jdbc.time_zone=America/Mexico_City

# IMPORTANTE: le dice a Hibernate en que schema buscar las tablas.
# Como conectas como "system", las tablas estan en schema SYSTEM.
spring.jpa.properties.hibernate.default_schema=SYSTEM

# Evita error con columnas NUMBER de Oracle y tipos Java
spring.jpa.open-in-view=false
